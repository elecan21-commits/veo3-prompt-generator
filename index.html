<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEO3 동영상 프롬프트 생성기</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 3em;
            color: #1a1a2e;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1.2em;
            color: #555;
            margin-bottom: 30px;
        }

        .form-section {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin: 30px 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: left;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .generate-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .result-section {
            background: linear-gradient(135deg, #84fab0, #8fd3f4);
            padding: 25px;
            border-radius: 15px;
            margin-top: 25px;
            display: none;
        }

        .result-text {
            background: white;
            padding: 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .copy-btn {
            background: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 VEO3 프롬프트 마스터</h1>
            <p>AI 동영상 생성을 위한 전문적이고 창의적인 프롬프트를 만들어보세요</p>
        </div>
        
        <div class="form-section">
            <h2 style="margin-bottom: 20px; color: #2d3748;">프롬프트 생성하기</h2>
            
            <div class="form-group">
                <label class="form-label">주요 대상 (Subject)</label>
                <input type="text" class="form-input" id="subject" placeholder="예: 젊은 여성, 용, 로봇 등...">
            </div>
            
            <div class="form-group">
                <label class="form-label">행동 & 상황 (Action)</label>
                <textarea class="form-textarea" id="action" placeholder="예: 숲을 걸어가며 신비로운 빛을 따라가고 있다"></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label">배경 & 환경 (Setting)</label>
                <textarea class="form-textarea" id="setting" placeholder="예: 일몰 무렵, 신비로운 고대 숲 속의 빛나는 호수 옆에서"></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label">스타일 (Style)</label>
                <input type="text" class="form-input" id="style" placeholder="예: cinematic, photorealistic, 4K">
            </div>
            
            <button class="generate-btn" onclick="generatePrompt()">
                ✨ 프롬프트 생성하기
            </button>
            
            <div class="result-section" id="resultSection">
                <button class="copy-btn" onclick="copyToClipboard()">📋 복사하기</button>
                <div class="result-text" id="resultText"></div>
            </div>
        </div>
    </div>

    <script>
        function generatePrompt() {
            const subject = document.getElementById('subject').value || 'a mysterious figure';
            const action = document.getElementById('action').value || 'standing in contemplation';
            const setting = document.getElementById('setting').value || 'in a dramatic landscape';
            const style = document.getElementById('style').value || 'cinematic, photorealistic, 4K';
            
            const prompt = `${subject} ${action} ${setting}, ${style}`;
            
            document.getElementById('resultText').textContent = prompt;
            document.getElementById('resultSection').style.display = 'block';
        }
        
        function copyToClipboard() {
            const resultText = document.getElementById('resultText').textContent;
            navigator.clipboard.writeText(resultText).then(function() {
                const copyBtn = document.querySelector('.copy-btn');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✅ 복사완료!';
                copyBtn.style.background = '#28a745';
                copyBtn.style.color = 'white';
                
                setTimeout(function() {
                    copyBtn.textContent = originalText;
                    copyBtn.style.background = 'white';
                    copyBtn.style.color = 'black';
                }, 2000);
            });
        }
    </script>
</body>
</html>
